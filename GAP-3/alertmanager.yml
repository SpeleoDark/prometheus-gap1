global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'mail.com'
  smtp_auth_username: 'mail.com'
  smtp_auth_password: 'pass'   # пароль приложения (не обычный пароль)
  smtp_require_tls: true

route:
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'telegram-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'email-warning'

receivers:
  - name: 'default'
    email_configs:
      - to: 'mail.com'

  - name: 'telegram-critical'
    telegram_configs:
      - bot_token: 'YOUR_BOT_TOKEN'           # токен бота от @BotFather
        chat_id: id123                     # ваш chat ID
        api_url: 'https://api.telegram.org'
        parse_mode: 'HTML'

  - name: 'email-warning'
    email_configs:
      - to: 'mail.com'                # получатель предупреждений
